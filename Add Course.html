    <main>
      <section>
        <form method ="post">
          <h2>Add a New Course</h2>
          <div class="form_group">
            <label>course name</label>
            <input type="text" required   placeholder="Enter Course Name" />
          </div>
  
          <div class="form_group">
            <label>Instructor</label>
            <input type="text" placeholder="Enter your favorite instructor's name" />
          </div>
          
          <div class="form_group">
            <label>Hours</label>
            <input type="number"  />
          </div>
          
          <div class="form_group">
            <label>Notes</label>
            <input type="text" />
          </div>
          <input type="submit" value="Add Course" />
        </form>
      </section>
